<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Laporan NOZIL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#020617;
min-height:100vh;
color:white;
overflow-x:hidden;
padding:14px;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#2563eb40,transparent 35%),
radial-gradient(circle at bottom right,#06b6d440,transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
z-index:-3;
}

.glow1,
.glow2{
position:fixed;
border-radius:50%;
filter:blur(100px);
z-index:-2;
}

.glow1{
width:280px;
height:280px;
background:#2563eb55;
top:-80px;
left:-80px;
}

.glow2{
width:280px;
height:280px;
background:#06b6d455;
bottom:-80px;
right:-80px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.08);
border-radius:30px;
padding:20px;
box-shadow:
0 15px 45px rgba(0,0,0,0.45),
inset 0 1px 0 rgba(255,255,255,0.05);
}

h2{
text-align:center;
font-size:32px;
font-weight:900;
margin-bottom:8px;
letter-spacing:2px;
background:linear-gradient(90deg,#ffffff,#7dd3fc,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:13px;
color:#94a3b8;
margin-bottom:18px;
font-weight:700;
letter-spacing:1px;
}

.main-btn{
width:100%;
padding:16px;
border:none;
border-radius:22px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
margin-bottom:14px;
background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03));
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.main-btn:active,
.tab-btn:active,
.edit-btn:active,
.save-btn:active,
.history-btn:active,
.delete-small:active{
transform:scale(0.98);
}

.tab-wrap{
display:flex;
gap:10px;
margin-bottom:18px;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
border-radius:20px;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
}

.active{
background:linear-gradient(135deg,#2563eb,#06b6d4);
box-shadow:0 12px 30px rgba(37,99,235,0.35);
}

.nonactive{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.filter-box{
margin-bottom:16px;
padding:14px;
border-radius:22px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
}

.filter-row{
display:flex;
gap:10px;
}

.filter-row input,
.filter-row select{
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:12px;
outline:none;
color:white;
font-weight:700;
}

option{
background:#0f172a;
}

.laporan-card{
margin-top:16px;
background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.04));
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:18px;
backdrop-filter:blur(20px);
box-shadow:
0 12px 35px rgba(0,0,0,0.30),
inset 0 1px 0 rgba(255,255,255,0.05);
}

.laporan-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:14px;
}

.header-left{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.judul{
font-size:18px;
font-weight:900;
color:white;
letter-spacing:0.3px;
word-break:break-word;
}

.subjudul{
font-size:12px;
font-weight:700;
color:#94a3b8;
}

.edited{
font-size:11px;
font-weight:800;
color:#fca5a5;
}

.edit-btn{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:16px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
font-size:16px;
cursor:pointer;
flex-shrink:0;
color:white;
}

.laporan-tanggal{
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
border-radius:20px;
margin-bottom:14px;
background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03));
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
}

.date-dot{
width:10px;
height:10px;
border-radius:50%;
background:#22d3ee;
box-shadow:0 0 14px #22d3ee;
flex-shrink:0;
}

.date-text{
font-size:14px;
font-weight:800;
letter-spacing:0.2px;
color:#e2e8f0;
}

.laporan-items{
display:flex;
flex-direction:column;
gap:0;
margin-top:-2px;
}

.item-list{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.item-left{
display:flex;
align-items:center;
gap:10px;
min-width:0;
}

.item-dot{
width:8px;
height:8px;
border-radius:50%;
background:#38bdf8;
box-shadow:0 0 10px #38bdf8;
flex-shrink:0;
}

.item-name{
font-size:15px;
font-weight:700;
color:#f8fafc;
word-break:break-word;
}

.item-small{
font-size:12px;
color:#94a3b8;
font-weight:700;
margin-top:2px;
}

.item-jumlah{
min-width:50px;
padding:7px 12px;
border-radius:999px;
text-align:center;
font-size:13px;
font-weight:900;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
color:#ffffff;
white-space:nowrap;
}

.total-box{
margin-top:14px;
padding:14px;
border-radius:20px;
background:rgba(34,211,238,0.08);
border:1px solid rgba(34,211,238,0.16);
display:flex;
justify-content:space-between;
gap:10px;
font-weight:900;
}

.note-box{
margin-top:14px;
padding:14px;
border-radius:18px;
background:rgba(239,68,68,0.08);
border:1px solid rgba(239,68,68,0.15);
font-size:14px;
font-weight:700;
line-height:1.5;
color:#fecaca;
}

img{
width:100%;
margin-top:14px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.08);
}

.edit-box{
margin-top:14px;
padding:14px;
border-radius:22px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
}

.input,
.small-input,
.edit-select{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:13px;
outline:none;
color:white;
}

.input,
.edit-select{
width:100%;
margin-top:8px;
margin-bottom:12px;
}

.small-input{
width:90px;
text-align:center;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.save-btn,
.history-btn{
width:100%;
padding:15px;
border:none;
border-radius:18px;
font-weight:900;
color:white;
margin-top:10px;
cursor:pointer;
}

.save-btn{
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.history-btn{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
}

.history-box{
margin-top:10px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
font-size:13px;
line-height:1.6;
color:#cbd5e1;
}

.loading,
.empty{
text-align:center;
padding:30px;
font-weight:800;
color:#94a3b8;
}

.badge-row{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

.badge{
padding:7px 10px;
border-radius:999px;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.08);
font-size:12px;
font-weight:800;
color:#cbd5e1;
}

.delete-small{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:rgba(239,68,68,0.12);
border:1px solid rgba(239,68,68,0.18);
color:white;
cursor:pointer;
font-size:16px;
flex-shrink:0;
}

@media(max-width:420px){
body{
padding:10px;
}
.card{
padding:16px;
border-radius:26px;
}
h2{
font-size:28px;
}
.filter-row{
flex-direction:column;
}
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">
<div class="card">

<h2>NOZIL</h2>
<div class="subtitle">LAPORAN DATA</div>

<button onclick="kembali()" class="main-btn">⬅️ Kembali ke Input</button>

<div class="tab-wrap">
<button id="btnLaporan" class="tab-btn active" onclick="showTab('laporan')">📋 Laporan</button>
<button id="btnRekap" class="tab-btn nonactive" onclick="showTab('rekap')">📊 Rekap</button>
</div>

<div id="tabLaporan">

<div class="filter-box">
<div class="filter-row">
<input type="date" id="filterTanggal" onchange="renderLaporan()">
<select id="filterJenis" onchange="renderLaporan()">
<option value="">Semua Jenis</option>
<option value="Masuk">Masuk</option>
<option value="Sisa">Sisa</option>
</select>
</div>
</div>

<div id="listLaporan" class="loading">Loading...</div>

</div>

<div id="tabRekap" style="display:none">

<div class="filter-box">
<div class="filter-row">
<input type="month" id="filterBulan" onchange="renderRekap()">
<select id="filterLokasi" onchange="renderRekap()">
<option value="">Semua Lokasi</option>
</select>
</div>
</div>

<div id="rekapHarian" class="loading">Loading...</div>

</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://khatulistiwa-db7cc-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

let semuaLaporan=[];
let hargaMap={};
let daftarItem=[];
let daftarLokasi=[];

function kembali(){
window.location.href="index.html";
}

function showTab(tab){
let laporan=document.getElementById("tabLaporan");
let rekap=document.getElementById("tabRekap");
let btnLaporan=document.getElementById("btnLaporan");
let btnRekap=document.getElementById("btnRekap");

if(tab==="laporan"){
laporan.style.display="block";
rekap.style.display="none";
btnLaporan.className="tab-btn active";
btnRekap.className="tab-btn nonactive";
}else{
laporan.style.display="none";
rekap.style.display="block";
btnLaporan.className="tab-btn nonactive";
btnRekap.className="tab-btn active";
renderRekap();
}
}

function rupiah(n){
return "Rp "+Number(n || 0).toLocaleString("id-ID");
}

function normalize(text){
return String(text || "").toLowerCase().trim();
}

function formatTanggal(waktu){
let date=new Date(waktu);
if(isNaN(date)) return "Tanggal tidak valid";

let hari=date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal=date.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
let jam=date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari} • ${tanggal} • ${jam}`;
}

function formatTanggalHari(waktu){
let date=new Date(waktu);
if(isNaN(date)) return "Tanggal tidak valid";

let hari=date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal=date.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});

return `${hari}, ${tanggal}`;
}

function tanggalKey(waktu){
let d=new Date(waktu);
if(isNaN(d)) return "";
return d.getFullYear()+"-"+
String(d.getMonth()+1).padStart(2,"0")+"-"+
String(d.getDate()).padStart(2,"0");
}

function bulanKey(waktu){
let d=new Date(waktu);
if(isNaN(d)) return "";
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function escapeHtml(text){
return String(text || "")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;");
}

function loadMasterItems(){
return db.ref("items").once("value").then(snap=>{
hargaMap={};
daftarItem=[];

if(snap.exists()){
snap.forEach(c=>{
let d=c.val();
let nama=d.nama || d;
let harga=d.harga || 0;

if(nama){
daftarItem.push(nama);
hargaMap[normalize(nama)]=Number(harga || 0);
}
});
}
});
}

function loadLaporan(){
let list=document.getElementById("listLaporan");
list.innerHTML=`<div class="loading">Loading...</div>`;

Promise.all([
loadMasterItems(),
db.ref("jajan").once("value")
]).then(([_,snap])=>{
semuaLaporan=[];
daftarLokasi=[];

if(snap.exists()){
snap.forEach(c=>{
let d=c.val() || {};
d.key=c.key;
semuaLaporan.push(d);

if(d.tempat && !daftarLokasi.includes(d.tempat)){
daftarLokasi.push(d.tempat);
}
});
}

semuaLaporan.sort((a,b)=>new Date(b.waktu)-new Date(a.waktu));
isiFilterLokasi();
renderLaporan();
renderRekap();
});
}

function isiFilterLokasi(){
let select=document.getElementById("filterLokasi");
let aktif=select.value;

select.innerHTML=`<option value="">Semua Lokasi</option>`;

daftarLokasi.sort().forEach(lokasi=>{
let opt=document.createElement("option");
opt.value=lokasi;
opt.textContent=lokasi;
select.appendChild(opt);
});

select.value=aktif;
}

function renderLaporan(){
let list=document.getElementById("listLaporan");
let filterTanggal=document.getElementById("filterTanggal").value;
let filterJenis=document.getElementById("filterJenis").value;

let data=semuaLaporan.filter(d=>{
let cocokTanggal=!filterTanggal || tanggalKey(d.waktu)===filterTanggal;
let cocokJenis=!filterJenis || d.jenis===filterJenis;
return cocokTanggal && cocokJenis;
});

list.innerHTML="";

if(data.length===0){
list.innerHTML=`<div class="empty">Belum ada data</div>`;
return;
}

data.forEach(d=>{
let total=0;

let items=(d.items || []).map(i=>{
let nama=i.barang || "Item";
let jumlah=Number(i.jumlah || 0);
let harga=hargaMap[normalize(nama)] || 0;
let subtotal=jumlah * harga;

if((d.jenis || "").toLowerCase()==="masuk"){
total += subtotal;
}

return `
<div class="item-list">
<div class="item-left">
<div class="item-dot"></div>
<div>
<div class="item-name">${escapeHtml(nama)}</div>
${harga ? `<div class="item-small">${rupiah(harga)} / item</div>` : ""}
</div>
</div>
<div class="item-jumlah">${jumlah}</div>
</div>
`;
}).join("");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">
<div class="header-left">
<div class="judul">${escapeHtml(d.jenis || "Data")} • ${escapeHtml(d.tempat || "-")}</div>
<div class="subjudul">ID: ${escapeHtml(d.key)}</div>
${d.riwayatEdit ? `<div class="edited">EDITED</div>` : ""}
</div>
<button class="edit-btn" onclick="toggleEdit('${d.key}')">✏️</button>
</div>

<div class="laporan-tanggal">
<div class="date-dot"></div>
<div class="date-text">${formatTanggal(d.waktu)}</div>
</div>

<div class="laporan-items">
${items || `<div class="empty">Tidak ada item</div>`}
</div>

${total ? `
<div class="total-box">
<span>Total Masuk</span>
<span>${rupiah(total)}</span>
</div>
` : ""}

<div id="edit-${d.key}" style="display:none"></div>

${d.catatan ? `<div class="note-box">📝 ${escapeHtml(d.catatan)}</div>` : ""}
${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);
});
}

function renderRekap(){
let container=document.getElementById("rekapHarian");
let filterBulan=document.getElementById("filterBulan").value;
let filterLokasi=document.getElementById("filterLokasi").value;

let data=semuaLaporan.filter(d=>{
let cocokBulan=!filterBulan || bulanKey(d.waktu)===filterBulan;
let cocokLokasi=!filterLokasi || d.tempat===filterLokasi;
return cocokBulan && cocokLokasi;
});

if(data.length===0){
container.innerHTML=`<div class="empty">Belum ada data rekap</div>`;
return;
}

let grup={};

data.forEach(d=>{
if(!d.waktu) return;
let key=tanggalKey(d.waktu);
if(!key) return;

if(!grup[key]){
grup[key]={
label:formatTanggalHari(d.waktu),
masuk:0,
sisa:0,
terjual:0,
total:0,
perItem:{},
perLokasi:{}
};
}

let jenis=normalize(d.jenis);
let lokasi=d.tempat || "Tanpa Lokasi";

if(!grup[key].perLokasi[lokasi]){
grup[key].perLokasi[lokasi]={masuk:0,sisa:0};
}

(d.items || []).forEach(i=>{
let nama=i.barang || "Item";
let jumlah=Number(i.jumlah || 0);
let harga=hargaMap[normalize(nama)] || 0;

if(!grup[key].perItem[nama]){
grup[key].perItem[nama]={masuk:0,sisa:0,terjual:0,total:0,harga:harga};
}

if(jenis.includes("masuk")){
grup[key].masuk += jumlah;
grup[key].perLokasi[lokasi].masuk += jumlah;
grup[key].perItem[nama].masuk += jumlah;
}

if(jenis.includes("sisa")){
grup[key].sisa += jumlah;
grup[key].perLokasi[lokasi].sisa += jumlah;
grup[key].perItem[nama].sisa += jumlah;
}
});
});

Object.keys(grup).forEach(key=>{
let g=grup[key];
let totalTerjual=0;
let totalUang=0;

Object.keys(g.perItem).forEach(nama=>{
let item=g.perItem[nama];
item.terjual=item.masuk-item.sisa;
if(item.terjual < 0) item.terjual=0;
item.total=item.terjual * item.harga;

totalTerjual += item.terjual;
totalUang += item.total;
});

g.terjual=totalTerjual;
g.total=totalUang;
});

container.innerHTML="";

Object.keys(grup).sort((a,b)=>new Date(b)-new Date(a)).forEach(key=>{
let g=grup[key];

let itemHTML=Object.keys(g.perItem).sort().map(nama=>{
let i=g.perItem[nama];
return `
<div class="item-list">
<div class="item-left">
<div class="item-dot"></div>
<div>
<div class="item-name">${escapeHtml(nama)}</div>
<div class="item-small">Masuk ${i.masuk} • Sisa ${i.sisa} • Terjual ${i.terjual}</div>
</div>
</div>
<div class="item-jumlah">${rupiah(i.total)}</div>
</div>
`;
}).join("");

let lokasiHTML=Object.keys(g.perLokasi).sort().map(lokasi=>{
let l=g.perLokasi[lokasi];
return `<span class="badge">${escapeHtml(lokasi)}: M ${l.masuk} / S ${l.sisa}</span>`;
}).join("");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">
<div class="header-left">
<div class="judul">📊 Rekap Harian</div>
<div class="subjudul">${filterLokasi ? escapeHtml(filterLokasi) : "Semua Lokasi"}</div>
</div>
</div>

<div class="laporan-tanggal">
<div class="date-dot"></div>
<div class="date-text">${g.label}</div>
</div>

<div class="badge-row">
${lokasiHTML}
</div>

<div class="laporan-items">
<div class="item-list">
<div class="item-name">Total Masuk</div>
<div class="item-jumlah">${g.masuk}</div>
</div>

<div class="item-list">
<div class="item-name">Total Sisa</div>
<div class="item-jumlah">${g.sisa}</div>
</div>

<div class="item-list">
<div class="item-name">Total Terjual</div>
<div class="item-jumlah">${g.terjual}</div>
</div>

${itemHTML}
</div>

<div class="total-box">
<span>Total Uang</span>
<span>${rupiah(g.total)}</span>
</div>
`;

container.appendChild(div);
});
}

function toggleEdit(key){
let box=document.getElementById("edit-"+key);

if(!box) return;

if(box.style.display==="block"){
box.style.display="none";
box.innerHTML="";
return;
}

db.ref("jajan/"+key).once("value",snap=>{
let d=snap.val();
if(!d) return;

let dateObj=new Date(d.waktu);
let local="";

if(!isNaN(dateObj)){
local=dateObj.getFullYear()+"-"+
String(dateObj.getMonth()+1).padStart(2,"0")+"-"+
String(dateObj.getDate()).padStart(2,"0")+"T"+
String(dateObj.getHours()).padStart(2,"0")+":"+
String(dateObj.getMinutes()).padStart(2,"0");
}

let itemsHTML=(d.items || []).map((i,idx)=>`
<div class="item-row" id="editRow-${key}-${idx}">
<span>${escapeHtml(i.barang)}</span>
<input type="number" value="${Number(i.jumlah || 0)}" id="jml-${key}-${idx}" class="small-input">
<button class="delete-small" onclick="hapusItemEdit('${key}',${idx})">×</button>
</div>
`).join("");

box.innerHTML=`
<div class="edit-box">
<b>✏️ Edit Data</b>
<br><br>

Jenis
<select id="jenisEdit-${key}" class="edit-select">
<option value="Masuk" ${d.jenis==="Masuk" ? "selected" : ""}>Masuk</option>
<option value="Sisa" ${d.jenis==="Sisa" ? "selected" : ""}>Sisa</option>
</select>

Lokasi
<input type="text" id="tempatEdit-${key}" value="${escapeHtml(d.tempat || "")}" class="input">

Tanggal
<input type="datetime-local" id="tglEdit-${key}" value="${local}" class="input">

Catatan
<input type="text" id="catatanEdit-${key}" value="${escapeHtml(d.catatan || "")}" class="input">

${itemsHTML || `<div class="empty">Tidak ada item</div>`}

<button onclick="simpanEdit('${key}')" class="save-btn">💾 Simpan</button>
<button onclick="lihatRiwayat('${key}')" class="history-btn">📜 Riwayat Edit</button>
<div id="history-${key}" style="display:none"></div>
</div>
`;

box.style.display="block";
});
}

function hapusItemEdit(key,idx){
let row=document.getElementById(`editRow-${key}-${idx}`);
if(row){
row.style.display="none";
row.setAttribute("data-deleted","true");
}
}

function simpanEdit(key){
db.ref("jajan/"+key).once("value",snap=>{
let oldData=snap.val();
if(!oldData) return;

let tglInput=document.getElementById("tglEdit-"+key).value;
let newDate=new Date(tglInput);

if(isNaN(newDate)){
alert("Tanggal salah!");
return;
}

let oldItems=oldData.items || [];
let newItems=[];

oldItems.forEach((i,idx)=>{
let row=document.getElementById(`editRow-${key}-${idx}`);
if(row && row.getAttribute("data-deleted")==="true") return;

let input=document.getElementById(`jml-${key}-${idx}`);
if(!input) return;

let jumlah=Number(input.value || 0);
if(jumlah<=0) return;

newItems.push({
barang:i.barang,
jumlah:jumlah
});
});

let newData={
waktu:newDate.toISOString(),
jenis:document.getElementById("jenisEdit-"+key).value,
tempat:document.getElementById("tempatEdit-"+key).value,
catatan:document.getElementById("catatanEdit-"+key).value,
items:newItems
};

let riwayat={
waktuEdit:new Date().toISOString(),
sebelum:{
waktu:oldData.waktu,
jenis:oldData.jenis,
tempat:oldData.tempat,
catatan:oldData.catatan || "",
items:oldData.items || []
},
sesudah:newData
};

db.ref("jajan/"+key+"/riwayatEdit").push(riwayat)
.then(()=>db.ref("jajan/"+key).update(newData))
.then(()=>{
alert("Berhasil diupdate");
loadLaporan();
});
});
}

function lihatRiwayat(key){
let box=document.getElementById("history-"+key);

if(!box) return;

if(box.style.display==="block"){
box.style.display="none";
return;
}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{
if(!snap.exists()){
box.innerHTML=`<div class="history-box">Belum ada riwayat</div>`;
box.style.display="block";
return;
}

let html="";

snap.forEach(c=>{
let d=c.val();
let sebelum=d.sebelum || {};
let sesudah=d.sesudah || {};

let sebelumItems=Array.isArray(sebelum.items) ? sebelum.items : (Array.isArray(d.sebelum) ? d.sebelum : []);
let sesudahItems=Array.isArray(sesudah.items) ? sesudah.items : (Array.isArray(d.sesudah) ? d.sesudah : []);

html += `
<div class="history-box">
<b>${new Date(d.waktuEdit).toLocaleString("id-ID")}</b>
<br><br>
<b>Sebelum</b><br>
Jenis: ${escapeHtml(sebelum.jenis || "-")}<br>
Lokasi: ${escapeHtml(sebelum.tempat || "-")}<br>
Item: ${sebelumItems.map(i=>`${escapeHtml(i.barang)} ${i.jumlah}`).join(", ") || "-"}
<br><br>
<b>Sesudah</b><br>
Jenis: ${escapeHtml(sesudah.jenis || "-")}<br>
Lokasi: ${escapeHtml(sesudah.tempat || "-")}<br>
Item: ${sesudahItems.map(i=>`${escapeHtml(i.barang)} ${i.jumlah}`).join(", ") || "-"}
</div>
`;
});

box.innerHTML=html;
box.style.display="block";
});
}

window.onload=function(){
let now=new Date();
document.getElementById("filterBulan").value=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
loadLaporan();
};
</script>

</body>
</html>
