<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:#020617;
min-height:100vh;
color:white;
overflow-x:hidden;
padding:14px;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#2563eb40,transparent 35%),
radial-gradient(circle at bottom right,#06b6d440,transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
z-index:-3;
}

.glow1,
.glow2{
position:fixed;
border-radius:50%;
filter:blur(100px);
z-index:-2;
}

.glow1{
width:280px;
height:280px;
background:#2563eb55;
top:-80px;
left:-80px;
}

.glow2{
width:280px;
height:280px;
background:#06b6d455;
bottom:-80px;
right:-80px;
}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.08);
border-radius:30px;
padding:20px;
box-shadow:
0 15px 45px rgba(0,0,0,0.45),
inset 0 1px 0 rgba(255,255,255,0.05);
}

/* TITLE */

h2{
text-align:center;
font-size:32px;
font-weight:900;
margin-bottom:18px;
letter-spacing:1px;

background:linear-gradient(
90deg,
#ffffff,
#7dd3fc,
#22d3ee
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */

.main-btn{
width:100%;
padding:16px;
border:none;
border-radius:22px;
font-size:15px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
margin-bottom:14px;

background:
linear-gradient(
135deg,
rgba(255,255,255,0.07),
rgba(255,255,255,0.03)
);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(10px);
}

.main-btn:active{
transform:scale(0.98);
}

/* TAB */

.tab-wrap{
display:flex;
gap:10px;
margin-bottom:18px;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
border-radius:20px;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:0.25s;
color:white;
}

.active{
background:linear-gradient(135deg,#2563eb,#06b6d4);

box-shadow:
0 12px 30px rgba(37,99,235,0.35);
}

.nonactive{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

/* LAPORAN CARD */

.laporan-card{
margin-top:16px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.07),
rgba(255,255,255,0.04)
);

border:1px solid rgba(255,255,255,0.08);

border-radius:28px;

padding:18px;

backdrop-filter:blur(20px);

box-shadow:
0 12px 35px rgba(0,0,0,0.30),
inset 0 1px 0 rgba(255,255,255,0.05);
}

/* HEADER */

.laporan-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.header-left{
display:flex;
flex-direction:column;
gap:4px;
}

.judul{
font-size:18px;
font-weight:900;
color:white;
letter-spacing:0.3px;
}

.edited{
font-size:11px;
font-weight:700;
color:#fca5a5;
}

.edit-btn{
width:42px;
height:42px;

display:flex;
align-items:center;
justify-content:center;

border-radius:16px;

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.08);

font-size:16px;

cursor:pointer;
}

/* TANGGAL */

.laporan-tanggal{

display:flex;
align-items:center;
gap:10px;

padding:12px 16px;

border-radius:20px;

margin-bottom:14px;

background:
linear-gradient(
135deg,
rgba(255,255,255,0.07),
rgba(255,255,255,0.03)
);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(12px);
}

.date-dot{
width:10px;
height:10px;
border-radius:50%;
background:#22d3ee;
box-shadow:0 0 14px #22d3ee;
flex-shrink:0;
}

.date-text{
font-size:14px;
font-weight:800;
letter-spacing:0.2px;
color:#e2e8f0;
}

/* ITEMS */

.laporan-items{
display:flex;
flex-direction:column;
gap:0;
margin-top:-2px;
}

.item-list{
display:flex;
justify-content:space-between;
align-items:center;

padding:6px 0;

border:none;
background:none;
border-radius:0;

border-bottom:
1px solid rgba(255,255,255,0.05);
}

.item-left{
display:flex;
align-items:center;
gap:10px;
}

.item-dot{
width:8px;
height:8px;
border-radius:50%;
background:#38bdf8;
box-shadow:0 0 10px #38bdf8;
}

.item-name{
font-size:15px;
font-weight:700;
color:#f8fafc;
}

.item-jumlah{

min-width:44px;

padding:7px 12px;

border-radius:999px;

text-align:center;

font-size:13px;
font-weight:900;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.08);

color:#ffffff;
}

/* CATATAN */

.note-box{
margin-top:14px;

padding:14px;

border-radius:18px;

background:rgba(239,68,68,0.08);

border:1px solid rgba(239,68,68,0.15);

font-size:14px;
font-weight:700;

line-height:1.5;

color:#fecaca;
}

/* IMAGE */

img{
width:100%;
margin-top:14px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.08);
}

/* EDIT */

.edit-box{
margin-top:14px;

padding:14px;

border-radius:22px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.08);
}

.input,
.small-input{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:13px;
outline:none;
color:white;
}

.input{
width:100%;
margin-top:8px;
margin-bottom:14px;
}

.small-input{
width:90px;
text-align:center;
}

.item-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
gap:10px;
}

.save-btn{
width:100%;
padding:15px;
border:none;
border-radius:18px;
font-weight:900;
color:white;
margin-top:10px;
cursor:pointer;

background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.history-btn{
width:100%;
padding:14px;
border:none;
border-radius:18px;
font-weight:800;
color:white;
margin-top:10px;
cursor:pointer;

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.08);
}

.history-box{
margin-top:10px;

padding:14px;

border-radius:18px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.08);

font-size:13px;
line-height:1.6;

color:#cbd5e1;
}

/* LOADING */

.loading{
text-align:center;
padding:30px;
font-weight:800;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">

<div class="card">

<h2>Laporan Jajan</h2>

<button onclick="kembali()" class="main-btn">
⬅️ Kembali ke Input
</button>

<div class="tab-wrap">

<button
id="btnLaporan"
class="tab-btn active"
onclick="showTab('laporan')">

📋 Laporan

</button>

<button
id="btnRekap"
class="tab-btn nonactive"
onclick="showTab('rekap')">

📊 Rekap

</button>

</div>

<div id="tabLaporan">

<div id="listLaporan" class="loading">
Loading...
</div>

</div>

<div id="tabRekap" style="display:none">

<div id="rekapHarian" class="loading">
Loading...
</div>

</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

// NAV
function kembali(){
window.location.href="index.html";
}

// TAB
function showTab(tab){

const laporan=document.getElementById("tabLaporan");
const rekap=document.getElementById("tabRekap");

const btnLaporan=document.getElementById("btnLaporan");
const btnRekap=document.getElementById("btnRekap");

if(tab==="laporan"){

laporan.style.display="block";
rekap.style.display="none";

btnLaporan.className="tab-btn active";
btnRekap.className="tab-btn nonactive";

}else{

laporan.style.display="none";
rekap.style.display="block";

btnLaporan.className="tab-btn nonactive";
btnRekap.className="tab-btn active";

}
}

// FIREBASE
firebase.initializeApp({
databaseURL:"https://khatulistiwa-db7cc-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

// FORMAT
function formatTanggal(waktu){

let date=new Date(waktu);

let hari=date.toLocaleDateString("id-ID",{
weekday:"long"
});

let tanggal=date.toLocaleDateString("id-ID",{
day:"numeric",
month:"long",
year:"numeric"
});

let jam=date.toLocaleTimeString("id-ID",{
hour:"2-digit",
minute:"2-digit"
});

return `${hari} • ${tanggal} • ${jam}`;
}

function formatTanggalHari(waktu){

let date=new Date(waktu);

let hari=date.toLocaleDateString("id-ID",{
weekday:"long"
});

let tanggal=date.toLocaleDateString("id-ID",{
day:"numeric",
month:"long",
year:"numeric"
});

return `${hari}, ${tanggal}`;
}

// LOAD LAPORAN
function loadLaporan(){

let list=document.getElementById("listLaporan");

list.innerHTML=`<div class="loading">Loading...</div>`;

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

if(!snap.exists()){

list.innerHTML=`<div class="loading">Belum ada data</div>`;
return;

}

let arr=[];

snap.forEach(c=>{

let d=c.val();

d.key=c.key;

arr.push(d);

});

arr.reverse();

arr.forEach(d=>{

let items=(d.items || [])
.map(i=>`

<div class="item-list">

<div class="item-left">

<div class="item-dot"></div>

<div class="item-name">
${i.barang}
</div>

</div>

<div class="item-jumlah">
${i.jumlah}
</div>

</div>

`)
.join("");

let div=document.createElement("div");

div.className="laporan-card";

div.innerHTML=`

<div class="laporan-header">

<div class="header-left">

<div class="judul">
${d.jenis} • ${d.tempat}
</div>

${d.riwayatEdit ? `
<div class="edited">
EDITED
</div>
` : ""}

</div>

<div
class="edit-btn"
onclick="toggleEdit('${d.key}')">

✏️

</div>

</div>

<div class="laporan-tanggal">

<div class="date-dot"></div>

<div class="date-text">
${formatTanggal(d.waktu)}
</div>

</div>

<div class="laporan-items">
${items}
</div>

<div id="edit-${d.key}" style="display:none"></div>

${d.catatan ? `
<div class="note-box">
📝 ${d.catatan}
</div>
` : ""}

${d.foto ? `
<img src="${d.foto}">
` : ""}

`;

list.appendChild(div);

});

});

}

// LOAD REKAP
function loadRekap(){

let container=document.getElementById("rekapHarian");

container.innerHTML=`<div class="loading">Loading...</div>`;

db.ref("items").once("value",snapItem=>{

let hargaMap={};

if(snapItem.exists()){

snapItem.forEach(c=>{

let d=c.val();

let nama=(d.nama || "").toLowerCase().trim();

hargaMap[nama]=Number(d.harga || 0);

});

}

db.ref("jajan").once("value",snap=>{

if(!snap.exists()){

container.innerHTML=`<div class="loading">Belum ada data</div>`;
return;

}

let data=Object.values(snap.val());

let grup={};

data.forEach(d=>{

if(!d.waktu) return;

let dateObj=new Date(d.waktu);

if(isNaN(dateObj)) return;

let key=dateObj.toLocaleDateString("id-ID",{
year:"numeric",
month:"2-digit",
day:"2-digit"
});

let label=formatTanggalHari(dateObj);

if(!grup[key]){

grup[key]={
label:label,
masukIkhwan:0,
masukAkhwat:0,
sisaIkhwan:0,
sisaAkhwat:0,
totalUang:0
};

}

let jenis=(d.jenis || "").toLowerCase();

let tempat=(d.tempat || "").toLowerCase();

(d.items || []).forEach(i=>{

let nama=(i.barang || "").toLowerCase().trim();

let jumlah=Number(i.jumlah || 0);

let harga=hargaMap[nama] || 0;

let subtotal=jumlah * harga;

if(jenis.includes("masuk") && tempat.includes("ikhwan")){
grup[key].masukIkhwan += jumlah;
grup[key].totalUang += subtotal;
}

if(jenis.includes("masuk") && tempat.includes("akhwat")){
grup[key].masukAkhwat += jumlah;
grup[key].totalUang += subtotal;
}

if(jenis.includes("sisa") && tempat.includes("ikhwan")){
grup[key].sisaIkhwan += jumlah;
}

if(jenis.includes("sisa") && tempat.includes("akhwat")){
grup[key].sisaAkhwat += jumlah;
}

});

});

container.innerHTML="";

Object.keys(grup)
.sort((a,b)=>new Date(b)-new Date(a))
.forEach(key=>{

let g=grup[key];

let terjual=
(g.masukIkhwan + g.masukAkhwat)
-
(g.sisaIkhwan + g.sisaAkhwat);

if(terjual < 0) terjual=0;

let div=document.createElement("div");

div.className="laporan-card";

div.innerHTML=`

<div class="laporan-header">

<div class="judul">
📊 Rekap Harian
</div>

</div>

<div class="laporan-tanggal">

<div class="date-dot"></div>

<div class="date-text">
${g.label}
</div>

</div>

<div class="laporan-items">

<div class="item-list">
<div class="item-name">Masuk Ikhwan</div>
<div class="item-jumlah">${g.masukIkhwan}</div>
</div>

<div class="item-list">
<div class="item-name">Masuk Akhwat</div>
<div class="item-jumlah">${g.masukAkhwat}</div>
</div>

<div class="item-list">
<div class="item-name">Sisa Ikhwan</div>
<div class="item-jumlah">${g.sisaIkhwan}</div>
</div>

<div class="item-list">
<div class="item-name">Sisa Akhwat</div>
<div class="item-jumlah">${g.sisaAkhwat}</div>
</div>

<div class="item-list">
<div class="item-name">Terjual</div>
<div class="item-jumlah">${terjual}</div>
</div>

<div class="item-list">
<div class="item-name">Total</div>
<div class="item-jumlah">
Rp ${g.totalUang.toLocaleString("id-ID")}
</div>
</div>

</div>

`;

container.appendChild(div);

});

});

});

}

// TOGGLE EDIT
function toggleEdit(key){

let box=document.getElementById("edit-"+key);

if(box.style.display==="block"){

box.style.display="none";
box.innerHTML="";

return;

}

db.ref("jajan/"+key).once("value",snap=>{

let d=snap.val();

let dateObj=new Date(d.waktu);

let local=
dateObj.getFullYear()+"-"+
String(dateObj.getMonth()+1).padStart(2,"0")+"-"+
String(dateObj.getDate()).padStart(2,"0")+"T"+
String(dateObj.getHours()).padStart(2,"0")+":"+
String(dateObj.getMinutes()).padStart(2,"0");

let itemsHTML=(d.items || []).map((i,idx)=>`

<div class="item-row">

<span>${i.barang}</span>

<input
type="number"
value="${i.jumlah}"
id="jml-${key}-${idx}"
class="small-input"
>

</div>

`).join("");

box.innerHTML=`

<div class="edit-box">

<b>
✏️ Edit Data
</b>

<br><br>

Tanggal

<input
type="datetime-local"
id="tglEdit-${key}"
value="${local}"
class="input"
>

${itemsHTML}

<button
onclick="simpanEdit('${key}')"
class="save-btn">

💾 Simpan

</button>

<button
onclick="lihatRiwayat('${key}')"
class="history-btn">

📜 Riwayat Edit

</button>

<div
id="history-${key}"
style="display:none">

</div>

</div>

`;

box.style.display="block";

});

}

// SIMPAN
function simpanEdit(key){

db.ref("jajan/"+key).once("value",snap=>{

let oldData=snap.val();

let items=oldData.items || [];

let tglInput=
document.getElementById("tglEdit-"+key).value;

let newDate=new Date(tglInput);

if(isNaN(newDate)){

alert("Tanggal salah!");
return;

}

let newItems=items.map((i,idx)=>{

let val=
document.getElementById(`jml-${key}-${idx}`).value;

return{
barang:i.barang,
jumlah:Number(val || 0)
};

});

let newData={
waktu:newDate.toISOString(),
items:newItems
};

db.ref("jajan/"+key+"/riwayatEdit").push({

waktuEdit:new Date().toISOString(),

sebelum:oldData.items,

sesudah:newItems

});

db.ref("jajan/"+key).update(newData).then(()=>{

alert("Berhasil diupdate");

loadLaporan();

loadRekap();

});

});

}

// RIWAYAT
function lihatRiwayat(key){

let box=document.getElementById("history-"+key);

if(box.style.display==="block"){

box.style.display="none";

return;

}

db.ref("jajan/"+key+"/riwayatEdit").once("value",snap=>{

if(!snap.exists()){

box.innerHTML=`
<div class="history-box">
Belum ada riwayat
</div>
`;

box.style.display="block";

return;

}

let html="";

snap.forEach(c=>{

let d=c.val();

html += `

<div class="history-box">

<b>
${new Date(d.waktuEdit).toLocaleString("id-ID")}
</b>

<br><br>

Sebelum :
${d.sebelum.map(i=>i.jumlah).join(", ")}

<br>

Sesudah :
${d.sesudah.map(i=>i.jumlah).join(", ")}

</div>

`;

});

box.innerHTML=html;

box.style.display="block";

});

}

// INIT
loadLaporan();

loadRekap();

</script>

</body>
</html>
